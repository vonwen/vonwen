name: Generate contribution grid snake

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: output
          fetch-depth: 0

      - name: Generate contribution grid snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          svg_out_path: ./github-contribution-grid-snake.svg
          gif_out_path: ./github-snake.gif

      - name: Push to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b output
          git add github-contribution-grid-snake.svg github-snake.gif
          git diff --staged --quiet || git commit -m "Update contribution snake [skip ci]"
          git push -f origin output
