name: Generate contribution grid snake

on:
  schedule:
    - cron: "0 18 * * *"  # run daily at 18:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate contribution grid snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          svg_out_path: ./github-contribution-grid-snake.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake.svg
          git diff --staged --quiet || git commit -m "Update contribution snake"
          git push
