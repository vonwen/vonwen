
<svg
  width="300"
  height="90"
  viewBox="0 0 300 90"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="descId"
>
  <title id="titleId">Most Used Languages</title>
  <desc id="descId">Most used programming languages</desc>
  <style>
    .header {
      font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #fe428e;
      animation: fadeInAnimation 0.8s ease-in-out forwards;
    }
    @supports(-moz-appearance: auto) {
      .header { font-size: 15.5px; }
    }
    @keyframes slideInAnimation {
      from { width: 0; }
      to { width: calc(100%-100px); }
    }
    @keyframes growWidthAnimation {
      from { width: 0; }
      to { width: 100%; }
    }
    .stat {
      font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #a9fef7;
    }
    @supports(-moz-appearance: auto) {
      .stat { font-size:12px; }
    }
    .bold { font-weight: 700 }
    .lang-name {
      font: 400 11px "Segoe UI", Ubuntu, Sans-Serif;
      fill: #a9fef7;
    }
    .lang-pct {
      font: 400 11px "Segoe UI", Ubuntu, Sans-Serif;
      fill: #8b949e;
    }
    .stagger {
      opacity: 0;
      animation: fadeInAnimation 0.3s ease-in-out forwards;
    }
    .lang-progress{
      animation: growWidthAnimation 0.6s ease-in-out forwards;
    }
    @keyframes fadeInAnimation {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <rect
    data-testid="card-bg"
    x="0.5"
    y="0.5"
    rx="4.5"
    height="99%"
    stroke="#e4e2e2"
    width="299"
    fill="#141321"
    stroke-opacity="1"
  />

  <g
    data-testid="card-title"
    transform="translate(25, 30)"
  >
    <text x="0" y="0" class="header" data-testid="header">Most Used Languages</text>
  </g>

  <g data-testid="main-card-body" transform="translate(0, 50)">
    <svg data-testid="lang-items" x="25">

      <!-- Python -->
      <g transform="translate(0, 0)">
        <text x="0" y="10" class="lang-name">Python</text>
        <text x="250" y="10" class="lang-pct" text-anchor="end">35.6%</text>
        <rect x="0" y="14" width="250" height="5" rx="2.5" fill="#3572A5" class="lang-progress" style="animation-delay:0.1s"/>
      </g>

      <!-- Go -->
      <g transform="translate(0, 24)">
        <text x="0" y="10" class="lang-name">Go</text>
        <text x="250" y="10" class="lang-pct" text-anchor="end">22.1%</text>
        <rect x="0" y="14" width="155" height="5" rx="2.5" fill="#00ADD8" class="lang-progress" style="animation-delay:0.2s"/>
      </g>

      <!-- SQL -->
      <g transform="translate(0, 48)">
        <text x="0" y="10" class="lang-name">SQL</text>
        <text x="250" y="10" class="lang-pct" text-anchor="end">15.8%</text>
        <rect x="0" y="14" width="111" height="5" rx="2.5" fill="#e38c00" class="lang-progress" style="animation-delay:0.3s"/>
      </g>

      <!-- Shell -->
      <g transform="translate(0, 72)">
        <text x="0" y="10" class="lang-name">Shell</text>
        <text x="250" y="10" class="lang-pct" text-anchor="end">10.3%</text>
        <rect x="0" y="14" width="72" height="5" rx="2.5" fill="#89e051" class="lang-progress" style="animation-delay:0.4s"/>
      </g>

    </svg>
  </g>
</svg>
